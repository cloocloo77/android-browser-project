name: Android EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID || vars.EAS_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi


      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate app config
        run: npx expo config --type public

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Validate required EAS credentials
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "Missing EXPO_TOKEN. Configure the EXPO_TOKEN repository secret to run Expo cloud builds." >&2
            exit 1
          fi

          if [ -z "${EAS_PROJECT_ID}" ]; then
            echo "EAS_PROJECT_ID is not configured as a secret/variable. The build can still run if projectId is defined in app config."
          fi

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run cloud build
        run: eas build --platform android --profile production --non-interactive --wait --json > eas-build.json

      - name: Get build artifact URL
        id: easurl
        run: |
          URL=$(jq -r 'if type=="array" then .[0].artifacts.buildUrl // empty else .artifacts.buildUrl // empty end' eas-build.json)
          if [ -z "$URL" ]; then
            BUILD_ID=$(jq -r 'if type=="array" then .[0].id else .id end' eas-build.json)
            URL=$(eas build:view "$BUILD_ID" --json | jq -r '.artifacts.buildUrl // empty')
          fi
          if [ -z "$URL" ]; then
            echo "No build artifact URL returned by EAS." >&2
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        run: curl --fail --location "${{ steps.easurl.outputs.url }}" --output app-release.apk

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app-release.apk

      - name: Publish release asset (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
