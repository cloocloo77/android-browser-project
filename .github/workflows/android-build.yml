name: Android EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi


      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate app config
        run: npx expo config --type public

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Check EXPO_TOKEN availability
        id: expo_token
        run: |
          if [ -n "${EXPO_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is not configured; skipping EAS cloud build steps."
          fi

      - name: Setup Expo and EAS
        if: steps.expo_token.outputs.available == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run cloud build
        if: steps.expo_token.outputs.available == 'true'
        run: eas build --platform android --profile production --non-interactive --json > eas-build.json

      - name: Get build artifact URL
        if: steps.expo_token.outputs.available == 'true'
        id: easurl
        run: |
          BUILD_ID=$(jq -r 'if type=="array" then .[0].id else .id end' eas-build.json)
          URL=$(eas build:view "$BUILD_ID" --json | jq -r '.artifacts.buildUrl // empty')
          if [ -z "$URL" ]; then
            echo "No build artifact URL returned by EAS." >&2
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        if: steps.expo_token.outputs.available == 'true'
        run: curl --fail --location "${{ steps.easurl.outputs.url }}" --output app-release.apk

      - name: Upload workflow artifact
        if: steps.expo_token.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app-release.apk

      - name: Publish release asset (tags only)
        if: startsWith(github.ref, 'refs/tags/') && steps.expo_token.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
